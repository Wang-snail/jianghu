<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">江湖本地优先</title>
  <desc id="desc">强调本地优先和隐私可控的简洁宣传图</desc>
  <rect width="1600" height="900" fill="#0a0f1d"/>
  <circle cx="1190" cy="450" r="260" fill="#0f766e" opacity="0.12"/>
  <path d="M1190 230 L1390 306 V444 C1390 585 1304 694 1190 742 C1076 694 990 585 990 444 V306 Z" fill="#102a2a" stroke="#5eead4" stroke-width="5"/>
  <path d="M1098 450 L1160 512 L1294 368" fill="none" stroke="#fbbf24" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="120" y="170" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="78" font-weight="800" fill="#f8fafc">本地优先</text>
  <text x="120" y="240" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="38" font-weight="700" fill="#fbbf24">数据和 API Key 留在你手里</text>
  <text x="120" y="308" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="26" fill="#94a3b8">江湖默认在本机运行。公开仓库不包含你的帮派产物、数据库或模型密钥。</text>
  <g transform="translate(120 420)" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif">
    <g fill="#111827" stroke="#1f2937" stroke-width="2">
      <rect width="700" height="82" rx="18"/>
      <rect y="112" width="700" height="82" rx="18"/>
      <rect y="224" width="700" height="82" rx="18"/>
    </g>
    <circle cx="42" cy="41" r="13" fill="#34d399"/>
    <circle cx="42" cy="153" r="13" fill="#34d399"/>
    <circle cx="42" cy="265" r="13" fill="#34d399"/>
    <text x="82" y="50" font-size="28" font-weight="700" fill="#f8fafc">本地数据库</text>
    <text x="82" y="162" font-size="28" font-weight="700" fill="#f8fafc">用户自配模型</text>
    <text x="82" y="274" font-size="28" font-weight="700" fill="#f8fafc">开源可审计</text>
    <text x="320" y="50" font-size="22" fill="#94a3b8">帮派记忆和成果不上传</text>
    <text x="320" y="162" font-size="22" fill="#94a3b8">不内置任何真实 API Key</text>
    <text x="320" y="274" font-size="22" fill="#94a3b8">代码、流程、权限清晰可查</text>
  </g>
</svg>
