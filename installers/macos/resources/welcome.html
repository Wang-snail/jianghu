<html>
<body style="font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 13px; color: #333;">
<h2>江湖</h2>
<p>本地 AI 数字组织生态系统。</p>
<p>安装后会把江湖运行文件放到本机，并添加 <code>zuzu</code> 命令。</p>
<p>安装完成后，江湖会启动本地服务并打开 <code>http://localhost:4700</code>。</p>
<p>以后可通过应用入口或终端重新启动。</p>
<p>所有委托、帮派、弟子、功法、钱庄流水默认保存在本机。</p>
<p>模型选项：</p>
<ul>
  <li>天机阁：MiMo、Claude Code、Codex 或本地 API 模型</li>
  <li>帮派弟子：按任务需要临时启动，完成后退出</li>
  <li>推荐使用已配置好的 MiMo/Claude Code 环境变量</li>
</ul>
<p>也可以从终端手动启动：</p>
<pre style="background: #f5f5f5; padding: 8px 12px; border-radius: 4px; font-size: 12px;">zuzu serve</pre>
</body>
</html>
